<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronics Store</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">ElectroStore</a>
  </div>
</nav>

<!-- ================= PRODUCT SECTION ================= -->
<section class="py-5">
  <div class="container">
    
    <h2 class="text-center fw-bold mb-5">Featured Products</h2>

    <div class="row g-4">

      <!-- Product 1 -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Laptop">
          <div class="card-body d-flex flex-column">
            <img src="laptop.png" class="card-img-top">
            <h5 class="card-title">Laptop</h5>
            <p class="card-text text-muted">High-performance laptop for work and gaming.</p>
            <p class="fw-bold text-primary">₹65,000</p>
            <div class="mt-auto">
              <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
              <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Smartphone">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">Smartphone</h5>
            <img src="phone 1.webp" class="card-img-top">
            <p class="card-text text-muted">Latest 5G smartphone with amazing camera.</p>
            <p class="fw-bold text-primary">₹25,000</p>
            <div class="mt-auto">
              <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
              <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Headphones">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">Headphones</h5>
            <img src="headphones.webp" class="card-img-top">
            <p class="card-text text-muted">Noise-cancelling wireless headphones.</p>
            <p class="fw-bold text-primary">₹5,000</p>
            <div class="mt-auto">
              <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
              <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Product 4 -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Smartwatch">
          <div class="card-body d-flex flex-column">
            <img src="smart watch.webp" class="card-img-top">
            <h5 class="card-title">Smartwatch</h5>
            <p class="card-text text-muted">Track fitness and notifications on the go.</p>
            <p class="fw-bold text-primary">₹8,000</p>
            <div class="mt-auto">
              <button class="btn btn-primary btn-sm w-100 mb-2">Add to Cart</button>
              <button class="btn btn-outline-secondary btn-sm w-100">View Details</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
