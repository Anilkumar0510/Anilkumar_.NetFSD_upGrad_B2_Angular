<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Form Validation</title>
</head>
<body>

<h2>📝 Registration Form</h2>

<label>Name:</label><br>
<input type="text" id="name" onchange="validateName()">
<p id="nameMsg"></p>

<label>Email:</label><br>
<input type="text" id="email" onchange="validateEmail()">
<p id="emailMsg"></p>

<label>Age:</label><br>
<input type="number" id="age" onchange="validateAge()">
<p id="ageMsg"></p>

<br>
<button onclick="submitForm()">Submit</button>

<script>
    let nameValid = false;
    let emailValid = false;
    let ageValid = false;

    function validateName(){
        let name = document.getElementById("name").value;
        if(name.trim() === ""){
            document.getElementById("nameMsg").innerHTML = "❌ Name cannot be empty";
            nameValid = false;
        } else {
            document.getElementById("nameMsg").innerHTML = "✅ Valid Name";
            nameValid = true;
        }
    }
    function validateEmail(){
        let email = document.getElementById("email").value;
        if(email.includes("@")){
            document.getElementById("emailMsg").innerHTML = "✅ Valid Email";
            emailValid = true;
        } else {
            document.getElementById("emailMsg").innerHTML = "❌ Email must contain @";
            emailValid = false;
        }
    }
    function validateAge(){
        let age = document.getElementById("age").value;
        if(age > 18){
            document.getElementById("ageMsg").innerHTML = "✅ Age is valid";
            ageValid = true;
        } else {
            document.getElementById("ageMsg").innerHTML = "❌ Age must be greater than 18";
            ageValid = false;
        }
    }
    function submitForm(){
        if(nameValid && emailValid && ageValid){

            sessionStorage.setItem("userName", document.getElementById("name").value);
            sessionStorage.setItem("userEmail", document.getElementById("email").value);
            sessionStorage.setItem("userAge", document.getElementById("age").value);

            alert("✅ Registration Successful! Data stored in sessionStorage");
        } else {
            alert("❌ Please fix validation errors before submitting");
        }
    }
</script>

</body>
</html>
