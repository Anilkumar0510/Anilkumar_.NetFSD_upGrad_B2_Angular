<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Location Logger</title>
</head>
<body>

<h2>📍 Location Logger</h2>

<button onclick="getLocation()">Get My Location</button>

<h3>Current Location</h3>
<p id="statusMsg"></p>
<p id="lat"></p>
<p id="lon"></p>

<h3>📜 Last 5 Locations</h3>
<ul id="historyList"></ul>

<script>
    window.onload = function(){
        displayHistory();
    };

    function getLocation(){

        document.getElementById("statusMsg").innerHTML = "Fetching location...";

        if(navigator.geolocation){

            navigator.geolocation.getCurrentPosition(
                showPosition,  
                showError,      
                { timeout: 10000 } 
            );

        } else {
            document.getElementById("statusMsg").innerHTML = "Geolocation not supported.";
        }
    }

    function showPosition(position){

        let latitude = position.coords.latitude;
        let longitude = position.coords.longitude;

        document.getElementById("statusMsg").innerHTML = "✅ Location fetched successfully";
        document.getElementById("lat").innerHTML = "Latitude: " + latitude;
        document.getElementById("lon").innerHTML = "Longitude: " + longitude;

        saveLocation(latitude, longitude);
        displayHistory();
    }
    function showError(error){

        let msg = "";

        switch(error.code){
            case error.PERMISSION_DENIED:
                msg = "❌ Permission denied by user.";
                break;
            case error.POSITION_UNAVAILABLE:
                msg = "❌ Location information unavailable.";
                break;
            case error.TIMEOUT:
                msg = "❌ Request timed out.";
                break;
            default:
                msg = "❌ Unknown error occurred.";
        }

        document.getElementById("statusMsg").innerHTML = msg;
    }
    function saveLocation(lat, lon){

        let locations = localStorage.getItem("locationHistory");

        
        locations = locations ? JSON.parse(locations) : [];

        locations.push({
            latitude: lat,
            longitude: lon,
            time: new Date().toLocaleString()
        });

        if(locations.length > 5){
            locations.shift();
        }

        localStorage.setItem("locationHistory", JSON.stringify(locations));
    }
    function displayHistory(){

        let list = document.getElementById("historyList");
        list.innerHTML = "";

        let locations = localStorage.getItem("locationHistory");

        if(!locations){
            list.innerHTML = "<li>No saved locations</li>";
            return;
        }

        locations = JSON.parse(locations);

        locations.forEach(function(loc){
            let li = document.createElement("li");
            li.innerHTML = `Lat: ${loc.latitude} , Lon: ${loc.longitude} <br> 🕒 ${loc.time}`;
            list.appendChild(li);
        });
    }

</script>

</body>
</html>
