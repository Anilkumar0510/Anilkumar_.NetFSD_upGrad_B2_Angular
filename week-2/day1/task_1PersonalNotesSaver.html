<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Notes Saver</title>
    <style>
        body{
            background-color: black;
        }
        h2{
            color: white;
        }
        button{
            background: green;
        }
    </style>
</head>
<body>

    <h2>📝 My Daily Notes</h2>
    <textarea id="notesBox" rows="8" cols="40" placeholder="Write your notes here..."></textarea>
    <br><br>
    <button onclick="saveNote()">Save</button>
    <button onclick="clearNote()">Clear</button>

    <script>
        window.onload = function() {
            let savedNote = localStorage.getItem("myNote");
            if(savedNote !== null){
                document.getElementById("notesBox").value = savedNote;
            }
        };
        function saveNote(){
            let noteText = document.getElementById("notesBox").value;
            localStorage.setItem("myNote", noteText);
            alert("Note saved successfully!");
        }
        function clearNote(){
            localStorage.removeItem("myNote");
            document.getElementById("notesBox").value = "";
            alert("Note cleared!");
        }
    </script>

</body>
</html>
