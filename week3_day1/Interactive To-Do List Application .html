<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive To-Do List</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 40px;
    }

    .container {
        width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
        width: 70%;
        padding: 8px;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
    }

    li {
        padding: 8px;
        margin-bottom: 8px;
        background: #e9e9e9;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 4px;
    }

    .completed {
        text-decoration: line-through;
        color: gray;
    }

    .deleteBtn {
        background: red;
        color: white;
        border: none;
        padding: 4px 8px;
        border-radius: 4px;
    }

    .stats {
        margin-top: 15px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter new task">
    <button id="addTask">Add</button>

    <ul id="taskList"></ul>

    <div class="stats">
        Total Tasks: <span id="totalCount">0</span> |
        Completed: <span id="completedCount">0</span>
    </div>
</div>

<script>
$(document).ready(function(){

    // Function to update counts
    function updateCounts(){
        var total = $("#taskList li").length;
        var completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    // Add Task
    $("#addTask").on("click", function(){

        var taskText = $("#taskInput").val().trim();

        if(taskText !== ""){

            var newTask = `
                <li>
                    <span class="taskText">${taskText}</span>
                    <button class="deleteBtn">Delete</button>
                </li>
            `;

            $("#taskList").append(newTask);

            $("#taskInput").val("");

            updateCounts();
        }
    });

    // Mark as Completed (Event Delegation)
    $("#taskList").on("click", ".taskText", function(){
        $(this).parent().toggleClass("completed");
        updateCounts();
    });

    // Delete Task (Event Delegation)
    $("#taskList").on("click", ".deleteBtn", function(){
        $(this).parent().remove();
        updateCounts();
    });

});
</script>

</body>
</html>
