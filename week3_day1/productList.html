<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product List - Add to Cart</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 30px;
    }

    .header {
        text-align: right;
        font-size: 18px;
        margin-bottom: 20px;
    }

    #cartCount {
        font-weight: bold;
        color: green;
    }

    .product-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .product {
        background: white;
        padding: 15px;
        width: 200px;
        border-radius: 8px;
        box-shadow: 0 0 8px rgba(0,0,0,0.1);
        text-align: center;
    }

    button {
        padding: 8px 12px;
        margin-top: 10px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }

    button:disabled {
        background: gray;
        cursor: not-allowed;
    }

    .confirmation {
        color: green;
        font-size: 14px;
        margin-top: 8px;
    }
</style>
</head>
<body>

<div class="header">
    Cart Items: <span id="cartCount">0</span>
</div>

<div class="product-container" id="productList">

    <div class="product">
        <h4>Laptop</h4>
        <p>₹45,000</p>
        <button class="addCart" data-name="Laptop">Add to Cart</button>
        <div class="confirmation"></div>
    </div>

    <div class="product">
        <h4>Smartphone</h4>
        <p>₹20,000</p>
        <button class="addCart" data-name="Smartphone">Add to Cart</button>
        <div class="confirmation"></div>
    </div>

    <div class="product">
        <h4>Headphones</h4>
        <p>₹2,000</p>
        <button class="addCart" data-name="Headphones">Add to Cart</button>
        <div class="confirmation"></div>
    </div>

    <div class="product">
        <h4>Smart Watch</h4>
        <p>₹5,000</p>
        <button class="addCart" data-name="Smart Watch">Add to Cart</button>
        <div class="confirmation"></div>
    </div>

</div>

<script>
$(document).ready(function(){

    var cartCounter = 0;

    // Event Delegation
    $("#productList").on("click", ".addCart", function(){

        // Increase counter
        cartCounter++;

        // Update cart text dynamically
        $("#cartCount").text(cartCounter);

        // Disable button using .prop()
        $(this).prop("disabled", true);

        // Change button text using .text()
        $(this).text("Added");

        // Add attribute using .attr()
        $(this).attr("title", "Product already added");

        // Show confirmation message
        $(this).siblings(".confirmation")
               .text("✔ Product added successfully!");

    });

});
</script>

</body>
</html>
